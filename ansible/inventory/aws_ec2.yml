plugin: amazon.aws.aws_ec2

regions:
  - ap-south-1

filters:
  instance-state-name: running
  tag:Name: ansible-server   # 👈 உன் EC2 tag

hostnames:
  - private-ip-address

keyed_groups:
  - key: tags.Name
    prefix: tag

compose:
  ansible_host: private_ip_address
  ansible_user: ubuntu

strict: False
