- name: Install nginx and git
  apt:
    name:
      - nginx
      - git
    state: present
    update_cache: yes

- name: Start and enable nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Remove existing web root
  file:
    path: "{{ web_root }}"
    state: absent

- name: Recreate web root
  file:
    path: "{{ web_root }}"
    state: directory
    mode: '0755'

- name: Remove default nginx page
  file:
    path: /var/www/html/index.nginx-debian.html
    state: absent

- name: Clone repo
  git:
    repo: "https://github.com/bharathidevopspro/ci-cd-project-.git"
    dest: "/tmp/app"
    version: main
    force: yes

- name: Copy website files
  copy:
    src: "/tmp/app/website/"
    dest: "{{ web_root }}/"
    owner: www-data
    group: www-data
    mode: '0755'
    remote_src: yes
  notify: restart nginx
