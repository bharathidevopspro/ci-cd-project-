- name: Install nginx and git
  apt:
    name:
      - nginx
      - git
    state: present
    update_cache: yes

- name: Start and enable nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Ensure web root exists
  file:
    path: "{{ web_root }}"
    state: directory
    mode: '0755'

- name: Remove default nginx page
  file:
    path: /var/www/html/index.nginx-debian.html
    state: absent

- name: Remove old website files
  shell: rm -rf {{ web_root }}/*
  args:
    warn: false

- name: Clone repo
  git:
    repo: "{{ repo_url }}"
    dest: "{{ dest_path }}"
    version: main
    force: yes

- name: Copy website files
  copy:
    src: "{{ dest_path }}/website/"
    dest: "{{ web_root }}/"
    owner: www-data
    group: www-data
    mode: '0755'
    remote_src: yes
  notify: restart nginx
